services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ecos
      POSTGRES_USER: ecos
      POSTGRES_PASSWORD: ecos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecos -d ecos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecos

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecos

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: >
      sh -c "pip install --no-cache-dir uv &&
      uv sync &&
      uv run uvicorn ecos.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - backend/.env.example
    environment:
      ECOS_DATABASE_URL: postgresql://ecos:ecos@postgres:5432/ecos
      ECOS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecos

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.local
      PGADMIN_DEFAULT_PASSWORD: change-me-development-only
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1/misc/ping', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecos

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  ecos:
    driver: bridge
