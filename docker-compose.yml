services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ecos
      POSTGRES_USER: ecos
      POSTGRES_PASSWORD: ${ECOS_POSTGRES_PASSWORD:-ecos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecos -d ecos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecos_internal

  migrations:
    build:
      context: .
    command: ["alembic", "upgrade", "head"]
    environment:
      ECOS_ENVIRONMENT: ${ECOS_ENVIRONMENT:-development}
      ECOS_DATABASE_URL: postgresql://ecos:${ECOS_POSTGRES_PASSWORD:-ecos}@postgres:5432/ecos
      ECOS_SESSION_REPOSITORY: postgres
      ECOS_MEMORY_REPOSITORY: postgres
      ECOS_OBSERVABILITY_REPOSITORY: postgres
      ECOS_KNOWLEDGE_REPOSITORY: postgres
      ECOS_SECURITY_REPOSITORY: postgres
      ECOS_OPERATIONAL_REPOSITORY: postgres
      ECOS_AUTH_TOKEN_SECRET: ${ECOS_AUTH_TOKEN_SECRET:-development-only-auth-secret-change-me-000000}
      ECOS_AUTH_DEMO_ENABLED: ${ECOS_AUTH_DEMO_ENABLED:-true}
      ECOS_DEMO_SEED_ENABLED: ${ECOS_DEMO_SEED_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecos_internal
    restart: "no"
    init: true

  app:
    build:
      context: .
    environment:
      ECOS_ENVIRONMENT: ${ECOS_ENVIRONMENT:-development}
      ECOS_DATABASE_URL: postgresql://ecos:${ECOS_POSTGRES_PASSWORD:-ecos}@postgres:5432/ecos
      ECOS_SESSION_REPOSITORY: postgres
      ECOS_MEMORY_REPOSITORY: postgres
      ECOS_OBSERVABILITY_REPOSITORY: postgres
      ECOS_KNOWLEDGE_REPOSITORY: postgres
      ECOS_SECURITY_REPOSITORY: postgres
      ECOS_OPERATIONAL_REPOSITORY: postgres
      ECOS_AUTH_TOKEN_SECRET: ${ECOS_AUTH_TOKEN_SECRET:-development-only-auth-secret-change-me-000000}
      ECOS_AUTH_DEMO_ENABLED: ${ECOS_AUTH_DEMO_ENABLED:-true}
      ECOS_DEMO_SEED_ENABLED: ${ECOS_DEMO_SEED_ENABLED:-true}
      ECOS_AI_PROVIDER: fake
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecos_internal
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    stop_grace_period: 30s
    pids_limit: 256

volumes:
  postgres_data:

networks:
  ecos_internal:
    driver: bridge
